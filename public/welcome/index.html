<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to MathSolver</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #ffffff;
    }
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 24px;
    }
    .welcome h1 {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #1a1a1a;
      text-align: center;
    }
    .welcome img {
      max-width: 100%;
      width: 600px;
      height: auto;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <div class="welcome">
    <h1>How to pin MathSolver Extension</h1>
    <img src="/welcome/welcome_1.png" alt="Welcome to MathSolver">
    <img src="/welcome/welcome_2.png" alt="Get Started with MathSolver">
  </div>
</body>
</html>
