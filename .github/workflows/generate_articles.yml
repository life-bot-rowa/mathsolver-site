name: Generate Articles

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      articles_per_run:
        description: 'How many articles to generate'
        required: false
        default: '5'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai openpyxl

      - name: Generate articles
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ARTICLES_PER_RUN: ${{ github.event.inputs.articles_per_run || '5' }}
        run: python generate_articles.py

      - name: Update pillar pages
        run: python update_pillars.py

      - name: Sync blog articles to public
        run: cp -r static/blog/* public/blog/ 2>/dev/null || true

      - name: Build report
        run: python send_report.py

      - name: Send email report
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "MathSolver — Daily Article Report ${{ github.run_number }}"
          to: 6205251@gmail.com
          from: MathSolver Bot
          body: file://daily_report.txt

      - name: Commit and push new articles
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config --global user.name "MathSolver Bot"
          git config --global user.email "bot@mathsolver.cloud"
          git remote set-url origin https://life-bot-rowa:${{ secrets.GH_TOKEN }}@github.com/life-bot-rowa/mathsolver-site.git
          git add .
          git diff --staged --quiet || git commit -m "Auto-publish $(date +%Y-%m-%d): new articles"
          git push
